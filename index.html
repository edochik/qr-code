<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- displays site properly based on user's device -->

	<link rel="icon" type="image/png" sizes="32x32" href="./img/favicon-32x32.png">
	<link rel="stylesheet" href="./css/style.css">
	<title>Frontend Mentor | QR code component</title>

</head>

<body>
	<div class="main">
		<div class="quar-card">
			<img class="quar-card__img" src="./img/image-qr-code.png" alt="img-quar-code">
			<h1 class="quar-card__title">Improve your front-end skills by building projects</h1>
			<p class="quar-card__info">Scan the QR code to visit Frontend Mentor and take your coding skills to the next
				level</p>
		</div>
	</div>
	<footer class="footer">
		<div class="attribution">
			Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
			Coded by <a href="#">Egor Toropov</a>.
		</div>
	</footer>
</body>

</html>
